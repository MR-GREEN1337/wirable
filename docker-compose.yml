version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentready
      POSTGRES_USER: agentready
      POSTGRES_PASSWORD: agentready
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentready"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://agentready:agentready@db:5432/agentready
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      DAYTONA_API_KEY: ${DAYTONA_API_KEY}
      DAYTONA_SERVER_URL: ${DAYTONA_SERVER_URL:-https://app.daytona.io}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      UNIPILE_DSN: ${UNIPILE_DSN:-}
      SENDING_EMAIL: ${SENDING_EMAIL:-}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-dev-secret}
      REPORT_BASE_URL: ${REPORT_BASE_URL:-http://localhost:3000}
    volumes:
      - ./backend:/app
      - ./harness:/harness
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "cd /app && python -m alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # Inlined into the client bundle at build time. The browser (not the
        # container) makes these calls, so it must reach the host-published port.
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  pgdata:
